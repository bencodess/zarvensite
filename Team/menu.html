<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarven Team | Auswahl</title>
    <link href="https://fonts.googleapis.com/css2?family=Concert+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-orange: #ff8c00;
            --light-orange: #ffb347;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(20, 20, 25, 0.8);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Concert One', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body {
            background: var(--dark-bg);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 60px 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 140, 0, 0.15) 0%, transparent 70%),
                        linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('background.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background: var(--primary-orange); border-radius: 10px; }

        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--primary-orange);
            border-radius: 50%;
            opacity: 0.2;
            filter: blur(8px);
            animation: move 15s linear infinite;
        }

        .menu-container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
            z-index: 10;
            text-align: center;
            margin: auto;
        }

        .menu-title {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 50px;
            background: linear-gradient(to bottom, #fff 50%, var(--primary-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .team-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .team-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 140, 0, 0.15);
            color: white;
            text-decoration: none;
            padding: 24px 30px;
            border-radius: 25px;
            font-size: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            /* Animation für das Erscheinen */
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s forwards;
        }

        .team-btn .btn-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .team-btn i.main-icon {
            color: var(--primary-orange);
            width: 40px;
            text-align: center;
            filter: drop-shadow(0 0 10px var(--primary-orange));
        }

        .team-btn .arrow-icon {
            font-size: 1.2rem;
            opacity: 0.3;
            transition: var(--transition);
        }

        .team-btn:hover {
            transform: scale(1.03) translateY(-5px);
            border-color: var(--primary-orange);
            background: rgba(255, 140, 0, 0.12);
            box-shadow: 0 20px 50px rgba(255, 140, 0, 0.25);
        }

        .team-btn:hover .arrow-icon {
            opacity: 1;
            transform: translateX(8px);
        }

        .team-btn:nth-child(1) { animation-delay: 0.1s; }
        .team-btn:nth-child(2) { animation-delay: 0.2s; }
        .team-btn:nth-child(3) { animation-delay: 0.3s; }
        .team-btn:nth-child(4) { animation-delay: 0.4s; }
        .team-btn:nth-child(5) { animation-delay: 0.5s; }
        .team-btn:nth-child(6) { animation-delay: 0.6s; }
        .team-btn:nth-child(7) { animation-delay: 0.7s; }
        .team-btn:nth-child(8) { animation-delay: 0.8s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes move {
            from { transform: translateY(100vh); }
            to { transform: translateY(-20vh); }
        }

        @media (max-width: 500px) {
            .menu-title { font-size: 2.5rem; }
            .team-btn { font-size: 1.5rem; padding: 20px; }
            body { padding: 40px 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="particles">

        <div class="particle" style="width: 40px; height: 40px; left: 85%; animation-duration: 18s;"></div>
        <div class="particle" style="width: 60px; height: 60px; left: 50%; animation-duration: 15s;"></div>
    </div>

    <div class="menu-container" id="mainMenu">
        <h1 class="menu-title">Das Team</h1>

        <div class="team-grid">
            <a href="Startseite.html" class="team-btn"><div class="btn-content"><i class="fas fa-crown main-icon"></i> Ben</div> <i class="fas fa-chevron-right arrow-icon"></i></a>
            <a href="index.html" class="team-btn"><div class="btn-content"><i class="fas fa-code main-icon"></i> SnaX</div> <i class="fas fa-chevron-right arrow-icon"></i></a>
            <a href="index-liam.html" class="team-btn"><div class="btn-content"><i class="fas fa-shield-alt main-icon"></i> Liam</div> <i class="fas fa-chevron-right arrow-icon"></i></a>
            <a href="index-apfelsaft.html" class="team-btn"><div class="btn-content"><i class="fas fa-tint main-icon"></i> Apfelsaft</div> <i class="fas fa-chevron-right arrow-icon"></i></a>
            <a href="index-vincent.html" class="team-btn"><div class="btn-content"><i class="fas fa-user-ninja main-icon"></i> Vincent</div> <i class="fas fa-chevron-right arrow-icon"></i></a>
            <a href="Startseite.html" class="team-btn"><div class="btn-content"><i class="fas fa-virus main-icon"></i> Tetanus</div> <i class="fas fa-chevron-right arrow-icon"></i></a>
            <a href="Startseite.html" class="team-btn"><div class="btn-content"><i class="fas fa-bolt main-icon"></i> Leon</div> <i class="fas fa-chevron-right arrow-icon"></i></a>
            <a href="Startseite.html" class="team-btn"><div class="btn-content"><i class="fas fa-ghost main-icon"></i> Fuzzel</div> <i class="fas fa-chevron-right arrow-icon"></i></a>            
            <a href="index-mode.html" class="team-btn"><div class="btn-content"><i class="fas fa-server main-icon"></i> Local Test</div> <i class="fas fa-chevron-right arrow-icon"></i></a>
            </div>
    </div>

    <script>
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    </script>
</body>
</html>
