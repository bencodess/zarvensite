<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zarven</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Outfit', sans-serif;
    background: #0a0a0a;
    background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(255, 140, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 140, 0, 0.05) 0%, transparent 50%);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
}
.lang-modal {
    display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
    z-index: 200;
}
.lang-options {
    display: flex;
    gap: 20px;
}
.lang-btn {
    padding: 20px 40px;
    background: linear-gradient(145deg, #141414, #1a1a1a);
    border: 1px solid rgba(255, 140, 0, 0.3);
    border-radius: 16px;
    color: #e0e0e0;
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s;
}
.lang-btn:hover {
    border-color: #ff9a3c;
    transform: scale(1.05);
}
.lang-btn img {
    width: 48px;
    height: 32px;
    display: block;
    margin: 0 auto 10px;
    border-radius: 4px;
    object-fit: cover;
}
</style>
</head>
<body>
<div class="lang-modal" id="langModal">
    <div class="lang-options">
        <button class="lang-btn" onclick="goTo404('de')"><img src="https://flagcdn.com/w80/de.png" alt="DE">Deutsch</button>
        <button class="lang-btn" onclick="goTo404('en')"><img src="https://flagcdn.com/w80/gb.png" alt="EN">English</button>
    </div>
</div>
<script>
function goTo404(lang) {
    window.location.href = '404.html?lang=' + lang;
}
</script>
</body>
</html>
