<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zarven</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
}

body {
    font-family: 'Outfit', sans-serif;
    background: #0a0a0a;
    background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(255, 140, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 140, 0, 0.05) 0%, transparent 50%);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
}

.card {
    background: linear-gradient(145deg, #141414, #1a1a1a);
    border-radius: 32px;
    text-align: center;
    border: 1px solid rgba(255, 140, 0, 0.2);
    box-shadow: 
        0 4px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: float 6s ease-in-out infinite;
    width: 100%;
    max-width: 600px;
    padding: 48px 24px;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

h1 {
    font-size: 48px;
    font-weight: 600;
    background: linear-gradient(135deg, #ff9a3c, #ff6b00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 8px;
}

p {
    margin-top: 16px;
    font-size: 16px;
    font-weight: 300;
    color: #888;
    letter-spacing: 1px;
}

.status {
    display: inline-block;
    margin-top: 24px;
    padding: 10px 24px;
    background: rgba(255, 140, 0, 0.1);
    border: 1px solid rgba(255, 140, 0, 0.3);
    border-radius: 50px;
    font-size: 14px;
    color: #ff9a3c;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.status::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #ff6b00;
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

@media (min-width: 768px) {
    .card {
        padding: 80px 60px;
    }
    h1 {
        font-size: 72px;
    }
    p {
        font-size: 20px;
    }
}

.footer {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #444;
    letter-spacing: 1px;
}
</style>

</head>
<body oncontextmenu="return false" onkeydown="return false" onselectstart="return false">

<div class="card" onmousedown="return false" oncopy="return false">
    <h1>ZARVEN</h1>
    <p>Diese Website befindet sich aktuell in Entwicklung.</p>
    <div class="status">Bald (~5 Tage)</div>
</div>

<div class="footer">&copy; 2026 Zarven Team. All rights reserved.</div>

</body>
</html>
